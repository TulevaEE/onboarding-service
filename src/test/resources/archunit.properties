# ArchUnit imports only ee.tuleva.onboarding classes; referenced Spring/JDK/library
# types are left as name-only stubs instead of being fully resolved from the classpath.
# Every architecture assertion only checks dependencies within ee.tuleva.onboarding,
# which ArchUnit matches by the referenced type's name (already present in the bytecode),
# so it needs no resolved external classes. This keeps the imported graph ~15x smaller
# and avoids a large transient-allocation spike during import.
resolveMissingDependenciesFromClassPath=false
