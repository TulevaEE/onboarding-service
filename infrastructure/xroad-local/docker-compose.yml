services:
  postgres:
    image: postgres:16
    container_name: xroad-postgres
    environment:
      POSTGRES_PASSWORD: ${XROAD_DB_PWD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - xroad
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  xroad:
    image: niis/xroad-security-server-sidecar:7.8.0-ee
    container_name: xroad-security-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      XROAD_TOKEN_PIN: ${XROAD_TOKEN_PIN}
      XROAD_ADMIN_USER: ${XROAD_ADMIN_USER}
      XROAD_ADMIN_PASSWORD: ${XROAD_ADMIN_PASSWORD}
      XROAD_DB_HOST: postgres
      XROAD_DB_PORT: "5432"
      XROAD_DB_PWD: ${XROAD_DB_PWD}
      XROAD_LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:4000:4000"   # admin UI
      - "127.0.0.1:5588:5588"   # healthcheck
      - "127.0.0.1:8443:8443"   # consumer information system port
    volumes:
      - xroad-config:/etc/xroad
      - xroad-archive:/var/lib/xroad
    networks:
      - xroad
    # Sidecar exposes the X-Road healthcheck on http://localhost:5588/. In a real
    # deployment with a loaded anchor it returns 200 OK. Locally without an anchor
    # it returns "Global configuration is expired" with HTTP 500 — that's expected;
    # the process is up. We use a port-reachability check to keep `docker compose
    # ps` showing healthy without forcing a real anchor.
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null --max-time 5 http://127.0.0.1:5588/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

networks:
  xroad:
    driver: bridge

volumes:
  postgres-data:
  xroad-config:
  xroad-archive:
